<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Calendar body -->
  <rect x="3" y="4" width="18" height="18" rx="3" ry="3" fill="#f4e7ce" stroke="#7d5636" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="3" y="4" width="18" height="6" rx="3" ry="3" fill="#b98956" stroke="#7d5636" stroke-width="1.5"/>
  <rect x="3" y="7" width="18" height="3" fill="#b98956" stroke="none"/>
  <!-- Calendar rings -->
  <line x1="8" y1="2" x2="8" y2="6" stroke="#4b3528" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="2" x2="16" y2="6" stroke="#4b3528" stroke-width="2" stroke-linecap="round"/>
  <!-- Date dots -->
  <circle cx="8" cy="14" r="1.3" fill="#7d5636"/>
  <circle cx="12" cy="14" r="1.3" fill="#7d5636"/>
  <circle cx="16" cy="14" r="1.3" fill="#7d5636"/>
  <circle cx="8" cy="18" r="1.3" fill="#d8b98c"/>
  <circle cx="12" cy="18" r="1.3" fill="#b66a63"/>
  <circle cx="16" cy="18" r="1.3" fill="#d8b98c"/>
</svg>
